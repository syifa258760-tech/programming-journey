<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tugas</title>
    <style>
        .kotak1 {
            width: 200px;
            height: 100px;
            background-color: blue;
            border: 2px solid blueviolet;
        }
        .kotak2 {
            width: 300px;
            height: 150px;
            background-color: pink;
            border: 2px solid purple;
        }
        .kotak3 {
            width: 400px;
            height: 200px;
            background-color: green;
            border: 2px solid greenyellow;
        }
    </style>
</head>
<body>
    <h2>kotak 1</h2>
    <div class="kotak1">lebar 200px dari layar</div>
    <h2>kotak 2</h2>
    <div class="kotak2">lebar 300px dari layar</div>
    <h2>kotak 3</h2>
    <div class="kotak3">lebar 400px dari layar</div>
</body>
</html>
