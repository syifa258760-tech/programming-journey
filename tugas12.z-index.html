<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            width: 200px;
            height: 200px;
            position: absolute;
        }
        .satu{
            background-color: salmon;
            z-index: 1;
        }
        .dua{
            background-color: lightgreen;
            top: 100px;
            left: 100px;
        }
        .tiga{
            background-color: royalblue;
             top: 200px;
            left: 200px;
        }
        img{
            width: 200px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="satu">
        <img src="ft bob.jpg" alt="jpg">
    </div>
    <div class="dua">
        <img src="ft bob 2.jpg" alt="jpg">
    </div>
    <div class="tiga"> 
        <img src="ft bob 3.jpg" alt="jpg">
    </div>
</body>
</html>>
