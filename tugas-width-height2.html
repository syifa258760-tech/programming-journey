<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

     <style>
        .kotak-besar {
            width: 600px;
            height: 400px;
            background-color: #6fb7c3;
            position:relative;
        }
        .kotak-kecil {
            width: 300px;
            height: 200px;
            background-color: #e57373;
            position:absolute;
            top:0;
            left:0;
        }
     </style>
</head>
<body>
    <div class="kotak-besar">
        <div class="kotak-kecil"></div>
    </div>
</body>
