<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div.gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
        }
        div.gallery-item {
            margin: 5px;
            border: 1px solid #ccc;
            width: 180px;
        }
        div.gallery-item:hover {
            border: 1px solid #777;
        }
        div.gallery-item img {
            width: 100%;
            height: auto;
        }
        div.gallery-item div.desc {
            padding: 15px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h2>image gallery</h2>

    <div class="gallery">
        
    <div class="gallery-item">
        <a target="_blank" href="gambar 1.jpg">
            <img src="gambar 1.jpg" alt="cinque terre" width="600" height="400">
        </a>
        <div class="desc">helle...</div>
    </div>

     <div class="gallery-item">
        <a target="_blank" href="gambar 2.jpg">
            <img src="gambar 2.jpg" alt="forest" width="600" height="400">
        </a>
        <div class="desc">Hai Cantik...</div>
    </div>

     <div class="gallery-item">
        <a target="_blank" href="gambar 3.jpg">
            <img src="gambar 3.jpg" alt="northern lights" width="600" height="400">
        </a>
        <div class="desc">Aku Keren...</div>
    </div>

     <div class="gallery-item">
        <a target="_blank" href="gambar 4.jpg">
            <img src="gambar 4.jpg" alt="mountains" width="600" height="400">
        </a>
        <div class="desc">Aku Sukaa...</div>
    </div>
    </div>
</body>
</html>
